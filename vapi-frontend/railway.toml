# Railway config for the FRONTEND service.
# Service settings: Root Directory = vapi-frontend (this file and the
# Dockerfile are resolved relative to that root). The repo-root railway.toml
# belongs to the backend service only.
#
# Build/start are owned by the Dockerfile — fully deterministic, no builder
# auto-detection. Deliberately no watchPatterns: the frontend redeploys on
# every push and can never be skipped with "watched paths not modified".

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# /login renders 200 for anonymous requests (the root path 307-redirects).
healthcheckPath = "/login"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
